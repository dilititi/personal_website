services:
  - type: web
    name: chen-personal-site
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /
        name: Cache-Control
        value: no-cache
      - path: /en/*
        name: Cache-Control
        value: no-cache
      - path: /zh/*
        name: Cache-Control
        value: no-cache
      - path: /*.html
        name: Cache-Control
        value: no-cache
      - path: /robots.txt
        name: Cache-Control
        value: public, max-age=300
      - path: /sitemap.xml
        name: Cache-Control
        value: public, max-age=300
